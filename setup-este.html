<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Setup Esteban — Quiniela Mundial 2026</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
  pre { background: #f4f4f4; padding: 16px; border-radius: 8px; font-size: 12px; overflow-x: auto; }
  .ok { color: green; font-weight: bold; font-size: 18px; }
  .err { color: red; font-weight: bold; font-size: 18px; }
  button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background: #1a1a2e; color: white; }
  button:hover { background: #333; }
</style>
</head>
<body>
<h2>🔧 Cargar marcadores de Esteban</h2>
<p>Guarda los <b>72 marcadores</b> de fase de grupos del usuario <b>este (Esteban)</b> basados en modelo de probabilidades. Los grupos, mejores terceros y bracket los llenas tú mismo en la quiniela.</p>
<button onclick="guardar()">Cargar 72 marcadores ▶</button>
<div id="out" style="margin-top:20px;"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script>
// Grupos: [1º winner, 2º, 3º] basado en FIFA ranking + rendimiento histórico
// Equipos anfitriones (MEX, USA, CAN) tienen ventaja de local
// Sorteo oficial FIFA dic 2025

// Solo carga los 72 marcadores de fase de grupos.
// Los grupos, mejores terceros y bracket los llenas tú mismo en la quiniela.
const pred = {
  scores: {
    // Grupo A: MEX, RSA, KOR, CZE
    // A-0:MEX vs RSA  A-1:KOR vs CZE  A-2:MEX vs KOR  A-3:CZE vs RSA  A-4:CZE vs MEX  A-5:RSA vs KOR
    "A-0":{h:2,a:0}, "A-1":{h:1,a:1}, "A-2":{h:1,a:0}, "A-3":{h:2,a:1}, "A-4":{h:1,a:2}, "A-5":{h:1,a:2},

    // Grupo B: CAN, BIH, QAT, SUI
    "B-0":{h:1,a:1}, "B-1":{h:0,a:2}, "B-2":{h:2,a:0}, "B-3":{h:1,a:0}, "B-4":{h:1,a:1}, "B-5":{h:2,a:0},

    // Grupo C: BRA, MAR, HAI, SCO
    "C-0":{h:2,a:0}, "C-1":{h:0,a:2}, "C-2":{h:3,a:0}, "C-3":{h:0,a:1}, "C-4":{h:0,a:2}, "C-5":{h:3,a:0},

    // Grupo D: USA, PAR, AUS, TUR
    "D-0":{h:2,a:1}, "D-1":{h:0,a:2}, "D-2":{h:2,a:0}, "D-3":{h:1,a:1}, "D-4":{h:1,a:2}, "D-5":{h:2,a:0},

    // Grupo E: GER, CUW, CIV, ECU
    "E-0":{h:4,a:0}, "E-1":{h:1,a:1}, "E-2":{h:2,a:0}, "E-3":{h:2,a:0}, "E-4":{h:0,a:3}, "E-5":{h:0,a:2},

    // Grupo F: NED, JPN, SWE, TUN
    "F-0":{h:2,a:1}, "F-1":{h:2,a:0}, "F-2":{h:2,a:0}, "F-3":{h:0,a:2}, "F-4":{h:0,a:3}, "F-5":{h:2,a:1},

    // Grupo G: BEL, EGY, IRN, NZL
    "G-0":{h:2,a:0}, "G-1":{h:2,a:0}, "G-2":{h:2,a:1}, "G-3":{h:0,a:1}, "G-4":{h:0,a:3}, "G-5":{h:1,a:1},

    // Grupo H: ESP, CPV, KSA, URU
    "H-0":{h:3,a:0}, "H-1":{h:1,a:2}, "H-2":{h:2,a:0}, "H-3":{h:2,a:0}, "H-4":{h:0,a:1}, "H-5":{h:1,a:1},

    // Grupo I: FRA, SEN, IRQ, NOR
    "I-0":{h:2,a:0}, "I-1":{h:0,a:3}, "I-2":{h:3,a:0}, "I-3":{h:1,a:1}, "I-4":{h:1,a:2}, "I-5":{h:2,a:0},

    // Grupo J: ARG, ALG, AUT, JOR
    "J-0":{h:2,a:0}, "J-1":{h:2,a:0}, "J-2":{h:1,a:0}, "J-3":{h:0,a:1}, "J-4":{h:0,a:2}, "J-5":{h:1,a:1},

    // Grupo K: POR, COD, UZB, COL
    "K-0":{h:2,a:0}, "K-1":{h:0,a:2}, "K-2":{h:3,a:0}, "K-3":{h:2,a:0}, "K-4":{h:1,a:1}, "K-5":{h:2,a:0},

    // Grupo L: ENG, CRO, GHA, PAN
    "L-0":{h:2,a:0}, "L-1":{h:2,a:0}, "L-2":{h:2,a:1}, "L-3":{h:0,a:2}, "L-4":{h:0,a:3}, "L-5":{h:2,a:1},
  }
};

function guardar() {
  const out = document.getElementById("out");
  out.innerHTML = "⏳ Conectando con Firebase...";

  try {
    if (!firebase.apps.length) {
      firebase.initializeApp({
        apiKey: "AIzaSyCzWH7jpmum3uIotEn0pwzu-LbVUfFgiI8",
        authDomain: "quiniela-hogar.firebaseapp.com",
        projectId: "quiniela-hogar",
        storageBucket: "quiniela-hogar.firebasestorage.app",
        messagingSenderId: "349998331708",
        appId: "1:349998331708:web:8bded3731262657f70d039",
      });
    }
    const db = firebase.firestore();
    // Usa update para no borrar grupos/ko que ya hayas llenado manualmente
    db.collection("quiniela").doc("player_este").set({ scores: pred.scores }, { merge: true })
      .then(() => {
        const count = Object.keys(pred.scores).length;
        out.innerHTML = '<p class="ok">✅ ' + count + ' marcadores de Esteban guardados en la nube!</p><p>Los grupos, mejores terceros y bracket quedan como estaban — llénalos tú en la quiniela.</p>';
      })
      .catch((err) => {
        out.innerHTML = '<p class="err">❌ Error al guardar: ' + err.message + '</p>';
      });
  } catch(e) {
    out.innerHTML = '<p class="err">❌ Error Firebase: ' + e.message + '</p>';
  }
}
</script>
</body>
</html>
